name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Calculate Version
        id: versioning
        run: |
          # Get latest tag
          latest_tag=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1 || echo "v0.0.0")
          
          # If it's a tag push, use it. If it's a sync (push to main) or manual, increment.
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            new_tag="${{ github.ref_name }}"
          else
            version=$(echo ${latest_tag:-v0.0.0} | sed 's/v//')
            major=$(echo $version | cut -d. -f1)
            minor=$(echo $version | cut -d. -f2)
            patch=$(echo $version | cut -d. -f3)
            new_tag="v$major.$minor.$((patch + 1))"
          fi
          
          echo "tag=$new_tag" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install and Build
        run: |
          npm ci
          npm run build
        env:
          VERSION: ${{ steps.versioning.outputs.tag }}

      - name: Prepare Assets
        run: |
          cd dist
          mv index.html management.html

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.versioning.outputs.tag }}
          files: dist/management.html
          generate_release_notes: true # GitHub will auto-generate notes for you
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
